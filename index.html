<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Future Impact Simulator</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#0b1220,#1e3a8a); color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="background:#111827; padding:35px; border-radius:16px; width:340px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.4);">

    <h1 style="margin-bottom:5px;">Future Impact Simulator</h1>
    <p style="font-size:13px; opacity:0.7; margin-bottom:20px;">See what your consistency builds over time</p>

    <input id="goal" type="text" placeholder="Your goal"
      style="width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; box-sizing:border-box;">

    <input id="hours" type="number" placeholder="Hours per day"
      style="width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; box-sizing:border-box;">

    <input id="days" type="number" placeholder="Days"
      style="width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; box-sizing:border-box;">

    <div style="display:flex; flex-direction:column; gap:10px; margin-top:12px;">

      <button onclick="simulate()"
        style="padding:12px; background:#38bdf8; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">
        Simulate Impact
      </button>

      <button onclick="resetFields()"
        style="padding:12px; background:#ef4444; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">
        Reset
      </button>

    </div>

    <div id="output" style="margin-top:18px; font-size:14px;"></div>

  </div>

<script>
function simulate() {
  let goal = document.getElementById("goal").value.trim();
  let hours = Number(document.getElementById("hours").value);
  let days = Number(document.getElementById("days").value);

  let totalHours = hours * days;

  let level = "";
  let insight = "";
  let advice = "";

  if (totalHours < 50) {
    level = "Beginner Phase";
    insight = "You are just starting out. Consistency matters more than intensity.";
    advice = "Focus on showing up daily, even if it's small effort.";
  } else if (totalHours < 150) {
    level = "Growth Phase";
    insight = "You are building momentum. This is where most people quit.";
    advice = "Stay consistent. Small daily effort compounds fast.";
  } else {
    level = "High Momentum Phase";
    insight = "You are entering identity change territory.";
    advice = "Keep going. This level creates real long-term transformation.";
  }

  document.getElementById("output").innerHTML = `
    <div style="
      background:#0f172a;
      padding:15px;
      border-radius:12px;
      text-align:left;
      line-height:1.6;
    ">
      <b>Goal:</b> ${goal || "Not set"}<br>
      <b>Total Hours:</b> ${totalHours}<br>
      <b>Status:</b> ${level}<br><br>
      <b>Insight:</b><br>${insight}<br><br>
      <b>Advice:</b><br>${advice}
    </div>
  `;
}

function resetFields() {
  document.getElementById("goal").value = "";
  document.getElementById("hours").value = "";
  document.getElementById("days").value = "";
  document.getElementById("output").innerHTML = "";
}
</script>

</body>
</html>
